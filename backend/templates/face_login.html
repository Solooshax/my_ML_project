<!DOCTYPE html>
<html>
<head>

<title>Face Login</title>

<style>

body{
font-family:Arial;
background:#f4f6fb;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
text-align:center;
width:400px;
}

video{
width:320px;
height:240px;
background:black;
border-radius:10px;
margin-top:10px;
}

button{
padding:10px 20px;
margin:10px;
border:none;
background:#ff4f8b;
color:white;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#ff2f6e;
}

</style>

</head>

<body>

<div class="card">

<h2>Face Login</h2>

<video id="video" autoplay></video>

<br>

<button onclick="toggleCamera()" id="cameraBtn">Camera ON</button>

<button onclick="loginFace()">Login</button>

<p id="status"></p>

</div>

<script>

let video=document.getElementById("video")
let stream=null

function toggleCamera(){

if(stream){

stream.getTracks().forEach(track=>track.stop())
video.srcObject=null
stream=null
document.getElementById("cameraBtn").innerText="Camera ON"
document.getElementById("status").innerText=""

}else{

navigator.mediaDevices.getUserMedia({video:true})
.then(s=>{
stream=s
video.srcObject=stream
document.getElementById("cameraBtn").innerText="Camera OFF"
})

}

}

function loginFace(){

let status=document.getElementById("status")

status.innerText="Recognising face..."

let canvas=document.createElement("canvas")

canvas.width=video.videoWidth
canvas.height=video.videoHeight

let ctx=canvas.getContext("2d")

ctx.drawImage(video,0,0)

let image=canvas.toDataURL("image/jpeg")

fetch("/login-face",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({image:image})

})

.then(res=>res.json())

.then(data=>{

if(data.success){

status.innerText="Face recognised. Logging in..."

window.location.href="/dashboard"

}else{

status.innerText="Face not recognised. Please register first"

}

})

}

</script>

</body>
</html>
