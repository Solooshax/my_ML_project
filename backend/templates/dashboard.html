<!DOCTYPE html>

<html lang="en">

<head>
<meta charset="UTF-8">
<title>AI Music Intelligence</title>

<style>

body{

.result-container{
    display:flex;
    gap:40px;
    margin-top:20px;
    align-items:flex-start;
}

#textResult{
    font-size:18px;
}

#playlistBox{
    background:#ffd1e8;
    padding:20px;
    border-radius:15px;
    width:300px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
    font-family:serif;
}

    
    margin:0;
    font-family: "Poppins", sans-serif;
    background: linear-gradient(135deg,#ffd6e8,#ffc2dc,#ffb3d4);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding-top:40px;

}

.card{

    width:420px;
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 20px 40px rgba(0,0,0,0.15);
    text-align:center;
}

h1{
    color:#ff4f9a;
    margin-bottom:10px;
}

h3{
    color:#444;
    margin-bottom:25px;
}

input[type=file]{
    padding:10px;
    border-radius:8px;
    border:1px solid #ddd;
    width:100%;
}

button{

    margin-top:20px;
    padding:12px 25px;
    border:none;
    border-radius:30px;
    background:linear-gradient(90deg,#ff4f9a,#ff82b6);
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:active{
    transform:scale(0.95);
}

#result{

    margin-top:25px;
    font-size:20px;
    color:#ff4f9a;
    font-weight:bold;
}

</style>

</head>

<body>

<div class="card">

<h1>🎧 AI Music Intelligence System </h1>

<h3>🎭 Emotion Detection</h3>

<input type="file" id="audioFile">

<!--button for emotion detection-->
<button onclick="detectEmotion(event)">Detect Emotion</button>

<div id="result" style="margin-top:10px;font-weight:bold;"></div>

<!--button for lyrics_analysis-->
<hr>

<h3>🎤 Voice Emotion Analysis</h3>

<button onclick="startRecording()">🎤 Start Recording</button>
<button onclick="stopRecording()">⏹ Stop Recording</button>

<div id="recordingStatus"></div>


<h3>🎵 Music Plagiarism Detection</h3>

<input type="file" id="plagiarismFile">

<button onclick="checkPlagiarism()">Check Plagiarism</button>

<div id="plagiarismResult"></div>

<hr>

<h3>🌍 Regional Music Genre Detection</h3>

<input type="file" id="regionAudio">

<button onclick="detectRegion()">Detect Region</button>

<div id="regionResult"></div>

<div class="result-container">

<div id="textResult"></div>

<div id="playlistBox"></div>

</div>

<hr>

<h3>🎼 Music Genre Identification</h3>

<input type="file" id="genreAudio">

<br><br>

<button onclick="detectGenre()">Detect Genre</button>

<div id="genreResult"></div>

<script src="/static/script.js"></script>

</body>

</html>
